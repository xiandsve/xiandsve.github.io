<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding RSVP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container p-5" style="width: 50vh;">
        <h1 class="text-center mb-4">RSVP</h1>
        <form onsubmit="submitForm(event)">
            <div class="mb-4">
                <label class="form-label fw-bold">Ще присъствате ли на нашата сватба?</label>
                <div class="form-check">
                    <label class="form-check-label">
                        <input class="form-check-input " type="radio" name="attending_wedding" value="yes" required> Да
                    </label>
                </div>
                <div class="form-check">
                    <label class="form-check-label">
                        <input class="form-check-input" type="radio" name="attending_wedding" value="no" required> Не
                    </label>
                </div>
            </div>
            <div id="guest-list" class="mb-4">
                <label class="form-label fw-bold">Вашите имена</label>
                <div class="mb-2">
                    <input type="text" class="form-control" name="guest1" placeholder="Име на гост" required>
                </div>
                <div class="mb-3">
                    <input type="text" class="form-control" name="guest2" placeholder="Име на гост">
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Хранителни предпочитания</label>
                <div class="form-check">
                    <label class="form-check-label">
                        <input class="form-check-input" type="radio" name="food_preference" value="no-preference" checked>Нямам
                    </label>
                </div>
                <div class="form-check">
                    <label class="form-check-label">
                        <input class="form-check-input" type="radio" name="food_preference" value="vegetarian">Вегетарианец
                    </label>
                </div>
                <div class="form-check">
                    <label class="form-check-label">
                        <input class="form-check-input" type="radio" name="food_preference" value="vegan">Веган
                    </label>
                </div>
            </div>
            <div class="mb-4">
                <label for="allergies" class="form-label fw-bold">Хранителни алергии</label>
                <textarea class="form-control" id="allergies" name="allergies" rows="4" placeholder="Моля, посочете, ако имате някакви..."></textarea>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Планирате ли допълнителна нощувка в хотела?</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="additional_stay" value="no" checked>
                    <label class="form-check-label">Не</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="additional_stay" value="yes_21">
                    <label class="form-check-label">Да (21.09)</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="additional_stay" value="yes_23">
                    <label class="form-check-label">Да (23.09)</label>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Ще присъствате ли на вземането на булката от Плевен?</label>
                <div class="form-check">
                    <label class="form-check-label">
                        <input class="form-check-input" type="radio" name="attending_pleven" value="maybe" checked> Не съм сигурен
                    </label>
                </div>
                <div class="form-check">
                    <label class="form-check-label">
                        <input class="form-check-input " type="radio" name="attending_pleven" value="yes"> Да
                    </label>
                </div>
                <div class="form-check">
                    <label class="form-check-label">
                        <input class="form-check-input" type="radio" name="attending_pleven" value="no"> Не
                    </label>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Имате ли нужда от транспорт?</label>
                <div class="form-check">
                    <label class="form-check-label">
                        <input class="form-check-input" type="radio" name="transport_need" value="no" checked> Не
                    </label>
                </div>
                <div class="form-check">
                    <label class="form-check-label">
                        <input class="form-check-input " type="radio" name="transport_need" value="yes_pleven"> Да, от Плевен
                    </label>
                </div>
                <div class="form-check">
                    <label class="form-check-label">
                        <input class="form-check-input " type="radio" name="transport_need" value="yes_sofia"> Да, от София
                    </label>
                </div>
            </div>
            <div class="mb-4">
                <label for="tracks" class="form-label fw-bold">🎵 Музикален поздрав 🎵 </label>
                <textarea class="form-control" id="tracks" name="tracks" rows="4" placeholder="Не е задължително, но ако желаете, може да ни поздравите с песен(и). Поздравите се изпращат директно към нашия DJ"></textarea>
            </div>
            <div class="mb-4">
                <label for="game_questions" class="form-label fw-bold">¿ Тя или той ?</label>
                <textarea class="form-control" id="game_questions" name="game_questions" rows="4" placeholder="&quot;Кой готви по-добре?&quot; - ако ви е интересно, може да запишете тук подобни въпроси, които могат да бъдат отправени към младоженците. Въпросите се изпращам директно към водещия." ></textarea>
            </div>
            <div class="mb-4">
                <label for="honeymoon" class="form-label fw-bold">Препоръчайти ни дестинация за меден месец</label>
                <input type="text" class="form-control" id="honeymoon" name="honeymoon">
            </div>
            <button type="submit" class="btn btn-primary">Изпрати</button>
        </form>
    </div>
    <script>
        function submitForm(event) {
            event.preventDefault(); // Prevent the default form submission
            const formData = new FormData(event.target);

            // Convert FormData to a plain object
            const data = {};
            formData.forEach((value, key) => {
                data[key] = value;
            });

            fetch('https://simple-heroku-rest-api-02982ee81527.herokuapp.com/api/rsvp', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data),
            })
            .then(response => response.json())
            .then(data => {
                console.log('Success:', data);
                alert('RSVP submitted successfully!');
            })
            .catch((error) => {
                console.error('Error:', error);
                alert('There was an error submitting your RSVP.');
            });
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
